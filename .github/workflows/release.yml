name: 2. Build & Auto-Release APK

# Push to main      -> builds, signs, AUTO-publishes a GitHub Release tagged
#                       b<run_number> (the in-app updater reads this; build
#                       number is baked in so the app auto-detects newer builds).
# Manual run         -> builds + signs, uploads APK as an artifact only
#                       (for quick testing, no release).
#
# No manual version bumping or tagging. Just push code.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate android/ scaffold
        run: flutter create . --org com.infoshare --project-name info_share_app --platforms=android

      - name: Patch AndroidManifest (permissions + overlay service)
        run: python3 tool/patch_manifest.py

      - name: Patch Gradle (force compileSdk 36 on all modules)
        run: python3 tool/patch_gradle.py

      - name: Pub get
        run: flutter pub get

      - name: Build release APK (build number = CI run number)
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Re-sign with stable release key
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "::error::缺少 ANDROID_KEYSTORE_B64 / ANDROID_KEYSTORE_PASSWORD secret。先跑一次 'Generate signing key' workflow 并把值填进 Secrets。"
            exit 1
          fi
          echo "$KS_B64" | base64 -d > release.jks
          BT=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)
          IN=build/app/outputs/flutter-apk/app-release.apk
          "$BT/zipalign" -f -p 4 "$IN" aligned.apk
          "$BT/apksigner" sign \
            --ks release.jks \
            --ks-pass "pass:$KS_PW" \
            --key-pass "pass:$KS_PW" \
            --out info_share_app.apk \
            aligned.apk
          "$BT/apksigner" verify --print-certs info_share_app.apk
          rm -f release.jks

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: info_share_app-apk
          path: info_share_app.apk
          retention-days: 14

      - name: Auto-publish GitHub Release (push to main)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: b${{ github.run_number }}
          name: build ${{ github.run_number }}
          files: info_share_app.apk
          generate_release_notes: true
